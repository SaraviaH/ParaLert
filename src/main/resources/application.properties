# =====================================================
# APP
# =====================================================

spring.application.name=paralert
server.port=8080

# =====================================================
# DATABASE
# =====================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# =====================================================
# HIKARI POOL
# =====================================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =====================================================
# JWT
# =====================================================

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =====================================================
# EMAIL (BREVO API)
# =====================================================

brevo.api-key=${BREVO_API_KEY}
brevo.sender.name=${BREVO_SENDER_NAME}
brevo.sender.email=${BREVO_SENDER_EMAIL}

# =====================================================
# THYMELEAF
# =====================================================

spring.thymeleaf.cache=false

# =====================================================
# CLOUDINARY
# =====================================================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =====================================================
# FILES
# =====================================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# CORS
# =====================================================

cors.allowed-origins=*

# =====================================================
# SWAGGER
# =====================================================

springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# =====================================================
# REGISTRO
# =====================================================

registro.codigo.expiracion-minutos=15
registro.pendiente.expiracion-minutos=60

# =====================================================
# CONFIANZA
# =====================================================

nivel.confianza.registro=40
nivel.confianza.verificado=100

# =====================================================
# API PERU
# =====================================================

apiperu.base-url=https://apiperu.dev/api
apiperu.token=${APIPERU_TOKEN}

# =====================================================
# LOGGING
# =====================================================

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR

# =====================================================
# CACHE (CAFFEINE)
# =====================================================
spring.cache.type=caffeine
spring.cache.cache-names=tiposPeligro
spring.cache.caffeine.spec=expireAfterWrite=1h,maximumSize=100
