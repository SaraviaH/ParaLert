# =====================================================
# APP
# =====================================================

spring.application.name=paralert
server.port=${SERVER_PORT:8080}

# =====================================================
# DATABASE
# =====================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =====================================================
# HIKARI POOL
# =====================================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =====================================================
# JWT
# =====================================================

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =====================================================
# EMAIL
# =====================================================

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =====================================================
# THYMELEAF
# =====================================================

spring.thymeleaf.cache=false

# =====================================================
# CLOUDINARY
# =====================================================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =====================================================
# FILES
# =====================================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# CORS
# =====================================================

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# =====================================================
# SWAGGER
# =====================================================

springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# =====================================================
# REGISTRO
# =====================================================

registro.codigo.expiracion-minutos=15
registro.pendiente.expiracion-minutos=60

# =====================================================
# CONFIANZA
# =====================================================

nivel.confianza.registro=40
nivel.confianza.verificado=100

# =====================================================
# API PERU
# =====================================================

apiperu.base-url=${APIPERU_BASE_URL:https://apiperu.dev/api}
apiperu.token=${APIPERU_TOKEN}

# =====================================================
# LOGGING
# =====================================================

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR